<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Ti voglio bene Cate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #faf6f1;
      --blush:    #e8d5c4;
      --rose:     #c9897a;
      --deep:     #7a4f3e;
      --ink:      #3a2820;
      --gold:     #c4a882;
      --soft:     #f2e8e0;
    }

    html, body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NOISE TEXTURE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      text-align: center;
      padding: 60px 24px 40px;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(201,137,122,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .header-eyebrow {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(38px, 10vw, 52px);
      line-height: 1.1;
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    h1 em {
      font-style: italic;
      color: var(--rose);
    }

    .header-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 24px auto 0;
      max-width: 200px;
    }

    .header-divider span {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }

    .header-divider span:last-child {
      background: linear-gradient(to left, transparent, var(--gold));
    }

    .header-divider svg {
      width: 14px; height: 14px;
      fill: var(--gold);
      flex-shrink: 0;
    }

    .header-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 15px;
      color: var(--deep);
      opacity: 0.7;
      margin-top: 20px;
      letter-spacing: 0.03em;
    }

    /* ── GRID ── */
    main {
      position: relative;
      z-index: 1;
      padding: 8px 20px 60px;
      max-width: 480px;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto;
      gap: 12px;
    }

    /* Card 1 — full width, tall */
    .card:nth-child(1) { grid-column: 1 / -1; }
    /* Card 4 — full width */
    .card:nth-child(4) { grid-column: 1 / -1; }
    /* Card 6 — full width */
    .card:nth-child(5) { grid-column: 1 / -1; }

    /* ── CARD ── */
    .card {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      background: var(--soft);
      box-shadow: 0 2px 16px rgba(122,79,62,0.08), 0 1px 3px rgba(122,79,62,0.06);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.35s ease;
      text-decoration: none;
      display: block;
    }

    .card:active {
      transform: scale(0.97);
      box-shadow: 0 1px 6px rgba(122,79,62,0.1);
    }

    .card-inner {
      position: relative;
      width: 100%;
      padding-bottom: 110%; /* portrait ratio */
      overflow: hidden;
    }

    .card:nth-child(1) .card-inner,
    .card:nth-child(4) .card-inner,
    .card:nth-child(6) .card-inner {
      padding-bottom: 56%; /* landscape for wide cards */
    }

    .card img,
    .card-placeholder {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
    }

    .card:hover img { transform: scale(1.04); }

    .card-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, var(--soft) 0%, var(--blush) 100%);
      gap: 10px;
    }

    .card-placeholder svg {
      width: 32px; height: 32px;
      stroke: var(--gold);
      stroke-width: 1.2;
      fill: none;
      opacity: 0.7;
    }

    .card-placeholder p {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--deep);
      opacity: 0.5;
    }

    /* Corner tag */
    .card-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 28px 16px 14px;
      background: linear-gradient(to top, rgba(58,40,32,0.55) 0%, transparent 100%);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: rgba(250,246,241,0.9);
      letter-spacing: 0.02em;
      pointer-events: none;
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 0 20px 48px;
    }

    .footer-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 0 auto 20px;
      max-width: 160px;
    }

    .footer-divider span {
      flex: 1;
      height: 1px;
      background: var(--blush);
    }

    .footer-divider svg {
      width: 10px; height: 10px;
      fill: var(--blush);
    }

    footer p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--deep);
      opacity: 0.45;
      letter-spacing: 0.03em;
    }

    /* ── ENTRANCE ANIMATION ── */
    .card {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
    }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.28s; }
    .card:nth-child(4) { animation-delay: 0.36s; }
    .card:nth-child(5) { animation-delay: 0.44s; }
    .card:nth-child(6) { animation-delay: 0.52s; }

    header {
      opacity: 0;
      animation: fadeUp 0.7s ease 0s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <p class="header-eyebrow">Una storia da ricordare</p>
    <h1>I nostri due mesi<br><em></em></h1>
    <div class="header-divider">
      <span></span>
      <svg viewBox="0 0 24 24"><path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/></svg>
      <span></span>
    </div>
    <p class="header-subtitle">Ogni immagine spiega un motivo per cui sto con te</p>
    <p class="header-subtitle">tranne l'ultima che spiega perchè non dovrei stare con te</p>
  </header>

  <main>
    <div class="grid">

      <!-- CARD 1 -->
      <a class="card" href="pages/foto1.html">
        <div class="card-inner">
          <img src="images/foto1.jpg" alt="Foto 1">
          
        </div>
        <div class="card-label">Primo motivo</div>
      </a>

      <!-- CARD 2 -->
      <a class="card" href="pages/foto2.html">
        <div class="card-inner">
          <img src="images/foto2.jpg" alt="Foto 2">
        </div>
        <div class="card-label">Secondo motivo</div>
      </a>

      <!-- CARD 3 -->
      <a class="card" href="pages/foto3.html">
        <div class="card-inner">
          <img src="images/foto3.jpg" alt="Foto 3">
        </div>
        <div class="card-label">Terzo motivo</div>
      </a>

      <!-- CARD 4 -->
      <a class="card" href="pages/foto4.html">
        <div class="card-inner">
          <img src="images/foto4.jpg" alt="Foto 4">
        </div>
        <div class="card-label">Quarto motivo</div>
      </a>

      <!-- CARD 5 -->
      <a class="card" href="pages/foto5.html">
        <div class="card-inner">
          <img src="images/foto5.jpg" alt="Foto 5">
        </div>
        <div class="card-label">Quinto motivo</div>
      </a>

      <!-- CARD 6 -->
      <a class="card" href="pages/foto6.html">
        <div class="card-inner">
          <img src="images/OIP.jpg" alt="Foto 6">
        </div>
        <div class="card-label"></div>
      </a>

    </div>
  </main>

  <footer>
    <div class="footer-divider">
      <span></span>
      <svg viewBox="0 0 24 24"><path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/></svg>
      <span></span>
    </div>
    <p>Da Nicola</p>
  </footer>

</body>
</html>
