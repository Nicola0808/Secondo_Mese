<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Errore</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      overflow: hidden;
    }

    /* Scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* Glitch noise */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9;
    }

    .graphic {
      position: relative;
      width: 220px;
      height: 220px;
      margin-bottom: 48px;
    }

    /* Glitching circles */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid;
      animation: spin linear infinite;
    }

    .ring:nth-child(1) {
      inset: 0;
      border-color: #ff2d55 transparent #ff2d55 transparent;
      animation-duration: 3s;
    }

    .ring:nth-child(2) {
      inset: 16px;
      border-color: transparent #00d4ff transparent #00d4ff;
      animation-duration: 2s;
      animation-direction: reverse;
    }

    .ring:nth-child(3) {
      inset: 32px;
      border-color: #ffcc00 transparent transparent transparent;
      animation-duration: 4s;
    }

    .ring:nth-child(4) {
      inset: 48px;
      border-color: transparent transparent #a855f7 transparent;
      animation-duration: 1.5s;
      animation-direction: reverse;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Center skull-ish broken icon */
    .center-icon {
      position: absolute;
      inset: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .center-icon svg {
      width: 100%;
      height: 100%;
      animation: glitch 2.5s infinite;
    }

    @keyframes glitch {
      0%, 90%, 100% { transform: translate(0,0); filter: none; }
      91% { transform: translate(-3px, 1px); filter: hue-rotate(90deg); }
      92% { transform: translate(3px, -1px); filter: hue-rotate(180deg); }
      93% { transform: translate(-1px, 2px); filter: hue-rotate(270deg); }
      94% { transform: translate(0,0); filter: none; }
    }

    /* Floating debris pixels */
    .pixel {
      position: absolute;
      width: 4px;
      height: 4px;
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { opacity: 0; transform: translate(0, 0); }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)); }
    }

    /* Error code */
    .error-code {
      font-size: 11px;
      color: #ff2d55;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 8px;
      animation: blink 1.4s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .error-hex {
      font-size: 32px;
      font-weight: bold;
      color: #ffffff;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
      text-shadow: 2px 0 #ff2d55, -2px 0 #00d4ff;
      animation: glitch-text 3s infinite;
    }

    @keyframes glitch-text {
      0%, 85%, 100% { text-shadow: 2px 0 #ff2d55, -2px 0 #00d4ff; }
      86% { text-shadow: -4px 0 #ff2d55, 4px 0 #00d4ff; clip-path: inset(20% 0 60% 0); }
      87% { text-shadow: 4px 0 #a855f7, -4px 0 #ffcc00; }
      88% { text-shadow: 2px 0 #ff2d55, -2px 0 #00d4ff; clip-path: none; }
    }

    /* Text box */
    .textbox-wrap {
      margin-top: 48px;
      width: 100%;
      max-width: 320px;
    }

    .textbox-label {
      font-size: 9px;
      color: #ffffff40;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .textbox {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #ffffff25;
      color: #ffffff80;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 8px 0;
      outline: none;
      caret-color: #ff2d55;
    }

    .textbox::placeholder {
      color: #ffffff20;
    }
  </style>
</head>
<body>

  <div class="graphic">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>

    <!-- Floating pixels -->
    <div class="pixel" style="background:#ff2d55; top:10%; left:20%; --dx:-30px; --dy:-40px; animation-duration:2.1s; animation-delay:0.3s;"></div>
    <div class="pixel" style="background:#00d4ff; top:80%; left:70%; --dx:20px; --dy:-50px; animation-duration:1.8s; animation-delay:0.9s;"></div>
    <div class="pixel" style="background:#ffcc00; top:30%; left:85%; --dx:-10px; --dy:40px; animation-duration:2.5s; animation-delay:0.1s;"></div>
    <div class="pixel" style="background:#a855f7; top:70%; left:10%; --dx:40px; --dy:-20px; animation-duration:2.8s; animation-delay:1.2s;"></div>
    <div class="pixel" style="background:#ff2d55; top:50%; left:50%; --dx:30px; --dy:30px; animation-duration:1.5s; animation-delay:0.6s;"></div>
    <div class="pixel" style="background:#00d4ff; top:15%; left:60%; --dx:-20px; --dy:50px; animation-duration:3.2s; animation-delay:0s;"></div>
    <div class="pixel" style="background:#ffcc00; top:60%; left:30%; --dx:-40px; --dy:-30px; animation-duration:2.3s; animation-delay:1.5s;"></div>
    <div class="pixel" style="width:6px; height:6px; background:#ffffff; top:40%; left:15%; --dx:50px; --dy:-40px; animation-duration:1.9s; animation-delay:0.4s;"></div>

    <div class="center-icon">
      <svg viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="45" cy="42" r="22" fill="#ffffff10" stroke="#ffffff30" stroke-width="1.5"/>
        <circle cx="36" cy="38" r="5" fill="#ff2d55"/>
        <circle cx="54" cy="38" r="5" fill="#ff2d55"/>
        <path d="M34 54 Q45 48 56 54" stroke="#ff2d55" stroke-width="2" fill="none" stroke-linecap="round"/>
        <line x1="22" y1="22" x2="68" y2="68" stroke="#ff2d55" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="22" y1="68" x2="68" y2="22" stroke="#ff2d55" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M10 45 L26 45 M64 45 L80 45 M45 10 L45 26 M45 64 L45 80" stroke="#ffffff20" stroke-width="1" stroke-dasharray="3 3"/>
      </svg>
    </div>
  </div>

  <p class="error-code">system failure</p>
  <p class="error-hex">Nessun Motivo Trovato</p>

  <div class="textbox-wrap">
    <p class="textbox-label">diagnostic input</p>
    <input class="textbox" type="text" placeholder="_ " autocomplete="off" spellcheck="false" />
  </div>

</body>
</html>
